name: build

on:
  push:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install MinGW-w64
        run: sudo apt-get install -y mingw-w64

      - name: Configure CMake
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build
